name: Deploy to GitHub Pages

# One-time setup:
# 1. Open https://github.com/EmaadAliKhan/H.NO/settings/pages
# 2. Under "Build and deployment", choose "Deploy from a branch"
# 3. Branch: gh-pages, folder: / (root)
# 4. Save, then push to main or re-run this workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_APP_USERNAME: ${{ vars.APP_USERNAME }}
          NEXT_PUBLIC_APP_PASSWORD: ${{ vars.APP_PASSWORD }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
